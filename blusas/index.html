<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://carlopr27.github.io">
<link rel="preload" href="./products.json" as="fetch" crossorigin>
<link rel="preconnect" href="https://img.prvstatic.com.mx">
<link rel="dns-prefetch" href="https://img.prvstatic.com.mx">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Seleccionador</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;width:100%;-webkit-text-size-adjust:100%;}
body{background:#F2F0ED;display:flex;flex-direction:column;align-items:center;font-family:Arial,sans-serif;overflow:hidden;}

.frame{width:100%;max-width:480px;height:100vh;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* Topbar — thin as possible */
.topbar{width:100%;background:#111;padding:6px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{font-size:16px;font-weight:900;letter-spacing:-0.5px;}
.logo-white{color:#fff;}.logo-red{color:#CC0022;}


/* Progress bar */
.prog-bar{width:100%;height:2px;background:#DDD9D2;flex-shrink:0;}
.prog-fill{height:100%;background:#CC0022;transition:width .4s ease;}

/* Card takes all remaining space */
.card-wrap{width:100%;padding:4px 10px 0;flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
.card-stage{position:relative;width:100%;height:calc(100vh - 130px);}

.product-card{position:absolute;inset:0;background:white;overflow:hidden;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .28s ease;will-change:transform;display:flex;flex-direction:column;}
.product-card.behind-1{transform:scale(.96) translateY(6px);z-index:1;}
.product-card.behind-2{transform:scale(.92) translateY(12px);z-index:0;}
.product-card.active{z-index:2;}
.product-card.exit-left{transform:translateX(-140%) rotate(-18deg)!important;opacity:0;pointer-events:none;}
.product-card.exit-right{transform:translateX(140%) rotate(18deg)!important;opacity:0;pointer-events:none;}
.product-card.tilt-l{transform:rotate(-5deg) translateX(-12px);}
.product-card.tilt-r{transform:rotate(5deg) translateX(12px);}

/* Image takes almost all the card */
.card-img{width:100%;flex:1;min-height:0;background:#ECEAE6;display:flex;align-items:center;justify-content:center;font-size:60px;overflow:hidden;}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s ease;}
@media(hover:hover){.card-img{cursor:zoom-in;}.card-img:hover img{transform:scale(1.16);}}

/* Stamps */
.stamp-row{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;background:white;border-top:1px solid #F0EDE8;flex-shrink:0;}
.stamp{font-size:10px;font-weight:900;letter-spacing:.1em;padding:2px 7px;border:1.5px solid;text-transform:uppercase;opacity:.25;transition:opacity .18s;pointer-events:none;}
.stamp-like{color:#2E7D32;border-color:#2E7D32;transform:rotate(4deg);display:inline-block;}
.stamp-paso{color:#CC0022;border-color:#CC0022;transform:rotate(-4deg);display:inline-block;}
.show-like .stamp-like{opacity:1;}.show-paso .stamp-paso{opacity:1;}

/* Card info — compact */
.card-info{padding:4px 10px 6px;flex-shrink:0;}
.c-meta{font-size:8px;font-weight:700;letter-spacing:.13em;color:#999;text-transform:uppercase;margin-bottom:1px;}
.c-name{font-size:13px;font-weight:900;color:#111;text-transform:uppercase;letter-spacing:-.2px;line-height:1.15;}

/* Dots */
.dot-row{display:flex;justify-content:center;gap:4px;padding:4px 0;width:100%;flex-wrap:wrap;flex-shrink:0;}
.dot{width:5px;height:5px;border-radius:50%;background:#DDD9D2;transition:background .25s;}
.dot.dl{background:#2E7D32;}.dot.dp{background:#CC0022;}.dot.dc{background:#111;transform:scale(1.3);}

/* Buttons */
.actions-wrap{width:100%;padding:0 10px 5px;display:flex;gap:6px;flex-shrink:0;}
.hint{text-align:center;font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:#BBB;padding:2px 0 4px;width:100%;flex-shrink:0;}

/* State screens */
.state-screen{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;}
.spinner{width:30px;height:30px;border:3px solid #DDD;border-top-color:#CC0022;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.state-msg{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#999;text-align:center;}
.state-sub{font-size:11px;color:#BBB;text-align:center;line-height:1.6;}

/* Resumen + Edad */
.premio-screen{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;gap:0;}
.resumen-box{width:100%;background:#111;border-radius:12px;padding:20px 16px;margin-bottom:24px;}
.resumen-num{font-size:48px;font-weight:900;color:#fff;line-height:1;letter-spacing:-2px;}
.resumen-num span{color:#CC0022;}
.resumen-label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.resumen-bar{width:100%;height:6px;background:#333;border-radius:3px;margin-top:14px;overflow:hidden;}
.resumen-bar-fill{height:100%;background:#CC0022;border-radius:3px;transition:width .6s ease;}
.premio-title{font-size:22px;font-weight:900;color:#111;text-transform:uppercase;letter-spacing:-0.5px;line-height:1.2;margin-bottom:6px;}
.premio-title span{color:#CC0022;}
.premio-sub{font-size:13px;color:#999;line-height:1.5;margin-bottom:18px;}
.edad-wrap{width:100%;display:flex;gap:8px;}
.edad-input{flex:1;padding:14px;border:1.5px solid #CCC;background:white;font-size:20px;font-weight:700;color:#111;text-align:center;outline:none;border-radius:0;-moz-appearance:textfield;}
.edad-input::-webkit-outer-spin-button,.edad-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.edad-input:focus{border-color:#111;}
.edad-note{font-size:10px;color:#CC0022;margin-top:8px;letter-spacing:.04em;font-weight:700;}

/* Results */
.res-frame{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
.res-topbar{width:100%;background:#111;padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.res-back{color:#777;font-size:16px;cursor:pointer;font-weight:700;}
.res-title{color:white;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;flex:1;}
.res-body{width:100%;flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch;}
.res-hl{font-size:22px;font-weight:900;color:#111;text-transform:uppercase;letter-spacing:-1px;line-height:1;margin-bottom:3px;}
.res-sub{font-size:11px;color:#999;margin-bottom:10px;}
.saving-badge{display:inline-block;font-size:10px;color:#BBB;margin-left:6px;animation:fade 1s infinite alternate;}
@keyframes fade{from{opacity:.3;}to{opacity:1;}}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;}
.stat-box{background:white;padding:10px;text-align:center;}
.stat-n{font-size:22px;font-weight:900;color:#111;display:block;line-height:1;}.stat-n.r{color:#CC0022;}
.stat-t{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#BBB;display:block;margin-top:2px;}
.sep{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#999;margin-bottom:6px;}
.res-list{display:flex;flex-direction:column;gap:1px;background:#DDD9D2;margin-bottom:12px;}
.res-item{background:white;display:flex;align-items:center;gap:10px;padding:8px 10px;}
.res-thumb{width:32px;height:32px;background:#F5F3F0;flex-shrink:0;overflow:hidden;}
.res-thumb img{width:100%;height:100%;object-fit:contain;}
.res-info{flex:1;min-width:0;}
.ri-meta{font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#BBB;}
.ri-name{font-size:11px;font-weight:700;color:#111;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vote-chip{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;flex-shrink:0;}
.vote-chip.q{background:#E8F5E9;color:#2E7D32;}.vote-chip.p{background:#FDEAED;color:#CC0022;}

/* Swipe tutorial overlay */
.swipe-tutorial{
  position:absolute;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;pointer-events:none;
  animation:tutfade 3.5s ease forwards;
  position:absolute;
}
@keyframes tutfade{
  0%{opacity:0;} 20%{opacity:1;} 70%{opacity:1;} 100%{opacity:0;}
}
.tut-arrow{
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.tut-left .tut-icon{font-size:28px;animation:nudgeleft 1s ease infinite;}
.tut-right .tut-icon{font-size:28px;animation:nudgeright 1s ease infinite;}
@keyframes nudgeleft{0%,100%{transform:translateX(0);}50%{transform:translateX(-8px);}}
@keyframes nudgeright{0%,100%{transform:translateX(0);}50%{transform:translateX(8px);}}
.tut-label{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:white;text-shadow:0 1px 3px rgba(0,0,0,.5);}
.tut-left .tut-label{color:#f87171;}
.tut-right .tut-label{color:#86efac;}
.tut-center{position:absolute;left:50%;transform:translateX(-50%);text-align:center;}
.tut-center-text{font-size:19px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;color:#fff;white-space:nowrap;background:#000;padding:8px 16px;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.5);}

.thanks-screen{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;gap:0;}
.thanks-emoji{font-size:64px;margin-bottom:20px;}
.thanks-title{font-size:30px;font-weight:900;color:#111;text-transform:uppercase;letter-spacing:-1px;line-height:1.1;margin-bottom:12px;}
.thanks-title span{color:#CC0022;}
.thanks-sub{font-size:14px;color:#999;line-height:1.7;}
</style>
</head>
<body>
<div class="frame"><div id="app"></div></div>
<script>
var API = "https://script.google.com/macros/s/AKfycbycoJi6NHF5r-0h2bGxaXk-r3UAQlo8l84mXjdHZivtowTLu1BuCcfu74TvCCVO5aY1/exec";
var MAX = 10; // se sobreescribe con el valor del Sheet
var LOGO = '<span class="logo"><span class="logo-white">TH</span> <span class="logo-red">Selection</span></span>';
var BTN = "border:none;color:#fff;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border-radius:0;outline:none;-webkit-tap-highlight-color:transparent;";
var EDAD_BTN = "padding:14px 18px;background:#888888;border:none;color:#ffffff;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border-radius:0;outline:none;white-space:nowrap;-webkit-tap-highlight-color:transparent;";

var productos=[], cur=0, votes=[], exiting=false, sessionId="", edadCapturada=null, _all=[];
var CATEGORIA="Blusas y Camisas";

function pickRandom(arr,n){return[].concat(arr).sort(function(){return Math.random()-.5;}).slice(0,Math.min(n,arr.length));}
function newSession(all){productos=pickRandom(all,MAX);cur=0;votes=[];exiting=false;edadCapturada=null;sessionId="sess-"+Date.now()+"-"+Math.random().toString(36).substr(2,5);}
function hoverPaso(on){var b=document.getElementById("btn-paso");if(b)b.style.background=on?"#333":"#111";tilt(on?"dislike":null);}
function hoverQuiero(on){var b=document.getElementById("btn-quiero");if(b)b.style.background=on?"#9E0B1A":"#CC0022";tilt(on?"like":null);}
function tilt(d){var c=document.getElementById("ac"),s=document.getElementById("stage");if(!c||exiting)return;c.className="product-card active"+(d?" tilt-"+(d==="like"?"r":"l"):"");if(s)s.className="card-stage"+(d?" show-"+(d==="like"?"like":"paso"):"");}
function vote(d){if(exiting||cur>=productos.length)return;exiting=true;var p=productos[cur];votes.push({p:p,v:d,ts:new Date().toISOString()});var c=document.getElementById("ac");if(c)c.className="product-card active "+(d==="like"?"exit-right":"exit-left");setTimeout(function(){cur++;exiting=false;if(cur>=productos.length)renderPremio();else render();},360);}

function sendBatchBackground(batch,edad){
  var items=batch.map(function(v){return{session_id:sessionId,timestamp:v.ts,edad:edad,categoria_set:CATEGORIA,marca:v.p.marca,categoria:v.p.categoria,producto:v.p.producto,respuesta:v.v==="like"?"Lo quiero":"Paso"};});
  var cbName="cb_"+Date.now()+"_"+Math.random().toString(36).substr(2,4);
  window[cbName]=function(){delete window[cbName];};
  var s=document.createElement("script");
  s.src=API+"?action=batch&callback="+cbName+"&data="+encodeURIComponent(JSON.stringify(items));
  document.head.appendChild(s);
}
function submitEdad(){
  var inp=document.getElementById("edad-input");
  var val=parseInt(inp.value);
  if(!val||val<10||val>100){inp.style.borderColor="#CC0022";inp.focus();return;}
  edadCapturada=val;
  renderResults();
  sendBatchBackground(votes.slice(0,5),edadCapturada);
  setTimeout(function(){sendBatchBackground(votes.slice(5),edadCapturada);},800);
}

function stackHTML(){
  var h="";
  for(var i=Math.min(cur+2,productos.length-1);i>=cur;i--){
    var p=productos[i],active=i===cur,behind=i-cur;
    var cls=active?"product-card active":"product-card behind-"+behind;
    var id=active?'id="ac"':" ";
    h+='<div class="'+cls+'" '+id+'>';
    h+='<div class="card-img">'+(p.image_url?'<img src="'+p.image_url+'" alt="">':'📦')+(active&&cur===0?'<div class="swipe-tutorial"><div class="tut-arrow tut-left"><div class="tut-icon">👈</div><div class="tut-label">Paso</div></div><div class="tut-center"><div class="tut-center-text">Swipe y decide</div></div><div class="tut-arrow tut-right"><div class="tut-icon">👉</div><div class="tut-label">Lo quiero</div></div></div>':'')+'</div>';
    h+='<div class="stamp-row"><span class="stamp stamp-paso">Paso</span><span class="stamp stamp-like">Lo quiero</span></div>';
    h+='<div class="card-info"><div class="c-meta">'+p.marca+' · '+p.categoria+'</div><div class="c-name">'+p.producto+'</div></div>';
    h+='</div>';
  }
  return h;
}
function dotsHTML(){
  return productos.map(function(_,i){
    var v=votes[i],isCur=i===cur&&!v;
    return '<div class="dot'+(v?(v.v==="like"?" dl":" dp"):(isCur?" dc":""))+'"></div>';
  }).join("");
}
function renderLoading(){
  document.getElementById("app").innerHTML='<div class="topbar">'+LOGO+'</div><div class="state-screen"><div class="spinner"></div><div class="state-msg">Cargando productos</div><div class="state-sub">Seleccionando al azar...</div></div>';
}
function renderEmpty(){
  document.getElementById("app").innerHTML='<div class="topbar">'+LOGO+'</div><div class="state-screen"><div style="font-size:40px">📋</div><div class="state-msg">Sin productos</div><div class="state-sub">Agrega productos en tu Google Sheet.</div></div>';
}
function render(){
  var pct=Math.round((cur/productos.length)*100);
  document.getElementById("app").innerHTML=
    '<div class="topbar">'+LOGO+'</div>'+
    '<div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="card-wrap"><div class="card-stage" id="stage">'+stackHTML()+'</div></div>'+
    '<div class="dot-row">'+dotsHTML()+'</div>'+
    '<div class="actions-wrap">'+
      '<button id="btn-paso" style="'+BTN+'flex:1;padding:13px 0;background:#111;" onmouseenter="hoverPaso(true)" onmouseleave="hoverPaso(false)" onclick="vote(\'dislike\')">✕ Paso</button>'+
      '<button id="btn-quiero" style="'+BTN+'flex:2;padding:13px 0;background:#CC0022;" onmouseenter="hoverQuiero(true)" onmouseleave="hoverQuiero(false)" onclick="vote(\'like\')">♡ Lo quiero</button>'+
    '</div>'+
    '<div class="hint">← paso · lo quiero →</div>';
  setTimeout(attachSwipe, 50);
}
function renderPremio(){
  var liked=votes.filter(function(v){return v.v==="like";}).length;
  var pct=MAX>0?Math.round((liked/MAX)*100):0;
  document.getElementById("app").innerHTML=
    '<div class="topbar">'+LOGO+'</div>'+
    '<div class="premio-screen">'+
      '<div class="resumen-box">'+
        '<div class="resumen-num"><span>'+liked+'</span> de '+MAX+'</div>'+
        '<div class="resumen-label">productos te gustaron</div>'+
        '<div class="resumen-bar"><div class="resumen-bar-fill" id="rbar" style="width:0%"></div></div>'+
      '</div>'+
      '<div class="premio-title">Una última<br><span>pregunta</span></div>'+
      '<div class="premio-sub">Tu edad nos ayuda a entender<br>mejor tu perfil de estilo.</div>'+
      '<div class="edad-wrap">'+
        '<input id="edad-input" class="edad-input" type="number" min="10" max="100" placeholder="Tu edad" onkeydown="if(event.key===\'Enter\')submitEdad()"/>'+
        '<button style="'+EDAD_BTN+'" onmouseenter="this.style.background=\'#666666\'" onmouseleave="this.style.background=\'#888888\'" onclick="submitEdad()">Ver resultados →</button>'+
      '</div>'+
      '<div class="edad-note">* Campo obligatorio</div>'+
    '</div>';
  setTimeout(function(){
    var i=document.getElementById("edad-input");if(i)i.focus();
    var b=document.getElementById("rbar");if(b)b.style.width=pct+"%";
  },100);
}
function renderResults(){
  document.getElementById("app").innerHTML=
    '<div class="topbar">'+LOGO+'</div>'+
    '<div class="thanks-screen">'+
      '<div class="thanks-emoji">🎉</div>'+
      '<div class="thanks-title">¡Gracias por<br>tu <span>selección</span>!</div>'+
      '<div class="thanks-sub">Tu opinión es muy valiosa para nosotros.<br>Ya puedes cerrar esta ventana.</div>'+
    '</div>';
}
function restart(){newSession(_all);render();}
function loadProductos(){
  // Load products.json from GitHub (fast, <300ms)
  fetch("./products.json?v="+Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!Array.isArray(data)||data.length===0){renderEmpty();return;}
      _all=data;
      newSession(_all);
      render();
    })
    .catch(function(){ renderEmpty(); });
}
function init(){
  renderLoading();
  var cbName="cfg_cb_"+Date.now();
  var s=document.createElement("script");
  window[cbName]=function(cfg){
    delete window[cbName];
    if(cfg && cfg.productos_max) MAX=parseInt(cfg.productos_max)||10;
    loadProductos();
  };
  s.onerror=function(){loadProductos();}; // si falla config, usa MAX=10
  s.src=API+"?action=config&callback="+cbName;
  document.head.appendChild(s);
}

// ── SWIPE TÁCTIL ─────────────────────────────────────────────
var touchStartX=0, touchStartY=0, touchCurrentX=0, isDragging=false;
var SWIPE_THRESHOLD=80; // px para confirmar swipe

function getActiveCard(){ return document.getElementById("ac"); }

function onTouchStart(e){
  if(exiting||cur>=productos.length)return;
  var t=e.touches[0];
  touchStartX=t.clientX; touchStartY=t.clientY;
  touchCurrentX=t.clientX;
  isDragging=true;
}

function onTouchMove(e){
  if(!isDragging)return;
  var t=e.touches[0];
  touchCurrentX=t.clientX;
  var dx=touchCurrentX-touchStartX;
  var dy=t.clientY-touchStartY;
  if(Math.abs(dx)<Math.abs(dy))return; // scroll vertical, ignorar
  e.preventDefault();
  var card=getActiveCard();
  var stage=document.getElementById("stage");
  if(!card)return;
  var rotate=dx/20;
  card.style.transform="translateX("+dx+"px) rotate("+rotate+"deg)";
  card.style.transition="none";
  // Mostrar stamp según dirección
  if(stage){
    if(dx>30) stage.className="card-stage show-like";
    else if(dx<-30) stage.className="card-stage show-paso";
    else stage.className="card-stage";
  }
}

function onTouchEnd(e){
  if(!isDragging)return;
  isDragging=false;
  var dx=touchCurrentX-touchStartX;
  var card=getActiveCard();
  var stage=document.getElementById("stage");
  if(!card){return;}
  card.style.transition="";
  if(stage) stage.className="card-stage";
  if(dx>SWIPE_THRESHOLD){ vote("like"); }
  else if(dx<-SWIPE_THRESHOLD){ vote("dislike"); }
  else {
    // Snap back
    card.style.transform="";
  }
}

function attachSwipe(){
  var stage=document.getElementById("stage");
  if(!stage)return;
  stage.addEventListener("touchstart", onTouchStart, {passive:true});
  stage.addEventListener("touchmove",  onTouchMove,  {passive:false});
  stage.addEventListener("touchend",   onTouchEnd,   {passive:true});
}

document.addEventListener("keydown",function(e){if(e.key==="ArrowLeft")vote("dislike");if(e.key==="ArrowRight")vote("like");});
init();
</script>
</body>
</html>
